name: Fix release latest.json

# Run this manually when a release's latest.json is missing platform entries
# (e.g. because the matrix race left only Linux entries).
# Usage: gh workflow run fix-latest-json.yml --field tag=v0.6.8
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to fix (e.g. v0.6.8)'
        required: true

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: lts/*

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      - name: Download existing latest.json and platform installers
        run: |
          mkdir -p /tmp/fix
          gh release download "${{ inputs.tag }}" -R ${{ github.repository }} \
            -p "latest.json" -p "*.dmg" -p "*_en-US.msi" \
            -D /tmp/fix --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign DMG and MSI
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          DMG=$(find /tmp/fix -name "*.dmg" | head -1)
          MSI=$(find /tmp/fix -name "*_en-US.msi" | head -1)

          # tauri signer sign reads TAURI_SIGNING_PRIVATE_KEY and
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD from the environment automatically.
          tauri signer sign "$DMG"
          tauri signer sign "$MSI"

          echo "DMG_NAME=$(basename "$DMG")" >> "$GITHUB_ENV"
          echo "MSI_NAME=$(basename "$MSI")" >> "$GITHUB_ENV"

      - name: Merge signatures into latest.json
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          BASE="https://github.com/${{ github.repository }}/releases/download/$TAG"

          # Tauri stores signatures as base64-encoded .sig file content
          DMG_SIG=$(base64 -w 0 < "/tmp/fix/${DMG_NAME}.sig")
          MSI_SIG=$(base64 -w 0 < "/tmp/fix/${MSI_NAME}.sig")

          jq \
            --arg dmg_sig "$DMG_SIG" \
            --arg dmg_url "$BASE/$DMG_NAME" \
            --arg msi_sig "$MSI_SIG" \
            --arg msi_url "$BASE/$MSI_NAME" \
            '.platforms["darwin-universal"] = {"signature": $dmg_sig, "url": $dmg_url} |
             .platforms["windows-x86_64"] = {"signature": $msi_sig, "url": $msi_url}' \
            /tmp/fix/latest.json > /tmp/latest.json

          echo "=== Merged platform keys ===" && jq '.platforms | keys' /tmp/latest.json

          gh release upload "$TAG" /tmp/latest.json -R ${{ github.repository }} --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
